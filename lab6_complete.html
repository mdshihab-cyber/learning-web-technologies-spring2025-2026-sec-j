<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>

body{
    text-align:center;
    font-family:Verdana;
    background-color:#f4f4f4;
}

h2{
    margin-top:20px;
}

#gameBox{
    width:380px;
    margin:auto;
    padding:20px;
    background-color:white;
    border:2px solid black;
    border-radius:10px;
}

#score{
    margin-bottom:12px;
    font-size:18px;
}

#status{
    margin-bottom:15px;
    font-size:20px;
    font-weight:bold;
}

#board{
    width:320px;
    margin:auto;
    display:grid;
    grid-template-columns:100px 100px 100px;
    gap:8px;
}

.cell{
    border:2px solid black;
    height:100px;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    background-color:#fafafa;
    border-radius:8px;
    transition:0.2s;
}

.cell:hover{
    background-color:#eaeaea;
}

.mark{
    transform:scale(1.1);
}

.winner{
    background-color:#c8f7c5;
}

#reset{
    margin-top:20px;
    padding:10px 20px;
    font-size:16px;
    border:1px solid black;
    border-radius:6px;
    cursor:pointer;
    background-color:#f0f0f0;
}

#reset:hover{
    background-color:#dddddd;
}

</style>
</head>

<body>

<h2>Tic Tac Toe</h2>

<div id="gameBox">

<div id="score">
X Score: <span id="xScore">0</span>
&nbsp;&nbsp;&nbsp;
O Score: <span id="oScore">0</span>
</div>

<div id="status">Current Player: X</div>

<div id="board"></div>

<button id="reset">Reset Game</button>

</div>

<script>

let board = ["","","","","","","","",""];

let currentPlayer = "X";
let gameActive = true;

let xScore = 0;
let oScore = 0;

let boardDiv = document.getElementById("board");
let statusDiv = document.getElementById("status");

let winPatterns = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function createBoard(){

    boardDiv.innerHTML = "";

    for(let i=0;i<9;i++){

        let cell = document.createElement("div");

        cell.className = "cell";

        cell.setAttribute("data-index",i);

        cell.addEventListener("click",cellClick);

        boardDiv.appendChild(cell);
    }
}

function cellClick(){

    let index = this.getAttribute("data-index");

    if(board[index] != "" || gameActive == false){
        return;
    }

    board[index] = currentPlayer;

    this.innerText = currentPlayer;

    this.classList.add("mark");

    checkGame();
}

function checkGame(){

    if(checkWinner()){

        statusDiv.innerText = "Winner: " + currentPlayer;

        gameActive = false;

        if(currentPlayer == "X"){
            xScore++;
            document.getElementById("xScore").innerText = xScore;
        }
        else{
            oScore++;
            document.getElementById("oScore").innerText = oScore;
        }

        return;
    }

    if(checkDraw()){

        statusDiv.innerText = "It's a draw!";

        gameActive = false;

        return;
    }

    if(currentPlayer == "X"){
        currentPlayer = "O";
    }
    else{
        currentPlayer = "X";
    }

    statusDiv.innerText = "Current Player: " + currentPlayer;
}

function checkWinner(){

    let cells = document.getElementsByClassName("cell");

    for(let i=0;i<winPatterns.length;i++){

        let a = winPatterns[i][0];
        let b = winPatterns[i][1];
        let c = winPatterns[i][2];

        if(board[a] != "" && board[a] == board[b] && board[a] == board[c]){

            cells[a].classList.add("winner");
            cells[b].classList.add("winner");
            cells[c].classList.add("winner");

            return true;
        }
    }

    return false;
}

function checkDraw(){

    for(let i=0;i<board.length;i++){
        if(board[i] == ""){
            return false;
        }
    }

    return true;
}

function resetGame(){

    board = ["","","","","","","","",""];

    currentPlayer = "X";
    gameActive = true;

    statusDiv.innerText = "Current Player: X";

    createBoard();
}

document.getElementById("reset").addEventListener("click",resetGame);

createBoard();

</script>

</body>
</html>
